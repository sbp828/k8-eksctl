apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx
  labels:
    app: nginx
    purpose: deployment
    tier: frontend
spec:
  replicas: 3

  selector:
      matchLabels:
        app: nginx
        tier: frontend
        project: test-project
  template:
     metadata:
      labels:
        app: nginx
        tier: frontend
        project: test-project
     spec:
      containers:
      - name: nginx
        image: nginx